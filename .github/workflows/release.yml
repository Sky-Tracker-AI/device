name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build linux/arm64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o skytracker-agent-linux-arm64 ./cmd/agent

      - name: Generate checksum
        run: sha256sum skytracker-agent-linux-arm64 > skytracker-agent-linux-arm64.sha256

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" --generate-notes || true
          gh release upload "$TAG_NAME" skytracker-agent-linux-arm64 skytracker-agent-linux-arm64.sha256 --clobber
